// AUDIO
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, dur, type='sine') {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
}
function playCorrect() { playSound(523,0.1); setTimeout(()=>playSound(659,0.1),100); setTimeout(()=>playSound(784,0.2),200); }

// MATCHING
function initMatching() {
    matchedCount = 0; matchScore = 0; matchSelected = null;
    const container = document.getElementById('matching-game'); container.innerHTML = '';
    const shuffledVn = [...matchingPairs].sort(() => Math.random() - 0.5);
    const grid = document.createElement('div'); grid.className = 'grid grid-cols-2 gap-3';
    matchingPairs.forEach((p, i) => {
        const han = document.createElement('div'); han.className = 'drag-item text-center text-lg';
        han.textContent = p.han; han.dataset.type = 'han'; han.dataset.idx = i;
        han.onclick = () => selectMatch(han); grid.appendChild(han);
    });
    shuffledVn.forEach((p) => {
        const vn = document.createElement('div'); vn.className = 'drag-item text-center text-sm';
        vn.textContent = p.vn; vn.dataset.type = 'vn'; vn.dataset.original = matchingPairs.findIndex(x => x.vn === p.vn);
        vn.onclick = () => selectMatch(vn); grid.appendChild(vn);
    });
    container.appendChild(grid);
    document.getElementById('matching-feedback').textContent = '';
}
function selectMatch(el) {
    if (el.classList.contains('matched')) return;
    if (!matchSelected) { matchSelected = el; el.classList.add('selected'); }
    else {
        if (matchSelected === el) { el.classList.remove('selected'); matchSelected = null; return; }
        const t1 = matchSelected.dataset.type, t2 = el.dataset.type;
        if (t1 === t2) { matchSelected.classList.remove('selected'); matchSelected = el; el.classList.add('selected'); return; }
        const hanEl = t1 === 'han' ? matchSelected : el;
        const vnEl = t1 === 'vn' ? matchSelected : el;
        if (hanEl.dataset.idx === vnEl.dataset.original) {
            playCorrect(); hanEl.classList.add('matched'); vnEl.classList.add('matched');
            matchedCount++; matchScore++;
            document.getElementById('matching-feedback').innerHTML = '✅ Chính xác!';
        } else { playWrong(); document.getElementById('matching-feedback').innerHTML = '❌ Thử lại nhé!'; }
        matchSelected.classList.remove('selected'); matchSelected = null;
        if (matchedCount === matchingPairs.length) { scores.matching = matchScore; document.getElementById('matching-feedback').innerHTML = `🎉 Hoàn thành! ${matchScore}/${matchingPairs.length}`; }
    }
}

        if (d.blank) {

                p.textContent = d.text;
                optsDiv.innerHTML = '<p class="text-sm text-gray-500 mb-2">Chọn từ phù hợp:</p>';
                d.opts.forEach((o, oi) => {
                    const btn = document.createElement('button'); btn.className = 'option-btn mb-2'; btn.textContent = o;

function showResults() {
